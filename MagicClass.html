<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Magic Class</title>
    <link rel="icon" type="image/x-icon" href="/imgs/logo.png">
    <link rel="stylesheet" href="styles/MagicClass.css">
    <link rel="stylesheet" href="styles/potions.css">
</head>
<body>
    <header>
        <nav>
            <img src="imgs/logo.png" alt="Logo" id="logo">
            <h1>CSS Magic Class</h1>
        </nav>
    </header>

<main>
    <div class="horizontal_flexbox">

        <div id="css_scroll">
            <pre><code id="css_code">Arrastra una poción al caldero...</code></pre>
        </div>

        <div id="magic_zone">
            <div id="magic_ball_wrapper"> 
                <div id="magic_ball"></div>
            </div>
            
            <div id="cauldron">
                <img src="imgs/cauldron.png" alt="Cauldron">
                <span class="bubble b1"></span>
                <span class="bubble b2"></span>
                <span class="bubble b3"></span>
                <span class="bubble b4"></span>
            </div>
        </div>

        <div id="potion_grid">
            <div class="potion" id="one" draggable="true">
                <img src="imgs/potion1.png">
            </div>
            <div class="potion" id="two" draggable="true">
                <img src="imgs/potion2.png">
            </div>
            <div class="potion" id="three" draggable="true">
                <img src="imgs/potion3.png">
            </div>

            <div class="shelf" id="transformations">
                <img src="imgs/transformations_shelf.png">
            </div>

            <div class="potion" id="four" draggable="true">
                <img src="imgs/potion4.png">
            </div>
            <div class="potion" id="five" draggable="true">
                <img src="imgs/potion5.png">
            </div>
            <div class="potion" id="six" draggable="true">
                <img src="imgs/potion6.png">
            </div>

            <div class="shelf" id="animations">
                <img src="imgs/animations_shelf.png">
            </div>
        </div>

    </div>
</main>

<script>
let magicClassCSS = "";
let potionsCSS = "";

// cargar CSS
Promise.all([
    fetch("styles/MagicClass.css").then(res => res.text()),
    fetch("styles/potions.css").then(res => res.text())
]).then(([magicClass, potions]) => {
    magicClassCSS = magicClass;
    potionsCSS = potions;
});

// regex de pociones
const potionSelectors = {
    "one":   /\/\*Potion_1\*\/([\s\S]*?)\/\*Potion_1_end\*\//,
    "two":   /\/\*Potion_2\*\/([\s\S]*?)\/\*Potion_2_end\*\//,
    "three": /\/\*Potion_3\*\/([\s\S]*?)\/\*Potion_3_end\*\//,
    "four":  /\/\*Potion_4\*\/([\s\S]*?)\/\*Potion_4_end\*\//,
    "five":  /\/\*Potion_5\*\/([\s\S]*?)\/\*Potion_5_end\*\//,
    "six":   /\/\*Potion_6\*\/([\s\S]*?)\/\*Potion_6_end\*\//,
};

const potionElements = document.querySelectorAll(".potion");

// drag start
potionElements.forEach(potion => {
    potion.addEventListener("dragstart", (e) => {
        e.dataTransfer.setData("text/plain", potion.id);
    });
});

const cauldron = document.getElementById("cauldron");
const body = document.body;

// permitir drop
cauldron.addEventListener("dragover", (e) => {
    e.preventDefault();
});

// clases de efectos
const potionClasses = {
    "one": "potion-one",
    "two": "potion-two",
    "three": "potion-three",
    "four": "potion-four",
    "five": "potion-five",
    "six": "potion-six",
};

function applyPotionEffect(id) {
    // quitar efecto anterior
    Object.values(potionClasses).forEach(cls => body.classList.remove(cls));

    // aplicar nuevo efecto
    if (potionClasses[id]) {
        body.classList.add(potionClasses[id]);
    }

    // mostrar código correcto
    if (potionSelectors[id]) {
        const match = potionsCSS.match(potionSelectors[id]);
        document.getElementById("css_code").textContent =
            match ? match[0] : "No se encontró la poción";
    }
}

function isPointInCauldron(x, y) {
    const rect = cauldron.getBoundingClientRect();
    return x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom;
}

// drop
cauldron.addEventListener("drop", (e) => {
    e.preventDefault();

    const id = e.dataTransfer.getData("text/plain");
    applyPotionEffect(id);

    cauldron.classList.remove("drag-over");
});

// soporte táctil para celulares
let touchDragId = null;
let touchGhost = null;

function createTouchGhost(sourcePotion) {
    const ghost = sourcePotion.cloneNode(true);
    const sourceRect = sourcePotion.getBoundingClientRect();

    ghost.style.position = "fixed";
    ghost.style.left = "0";
    ghost.style.top = "0";
    ghost.style.width = `${sourceRect.width}px`;
    ghost.style.height = `${sourceRect.height}px`;
    ghost.style.pointerEvents = "none";
    ghost.style.zIndex = "9999";
    ghost.style.opacity = "0.9";
    ghost.style.transform = "translate(-9999px, -9999px)";

    document.body.appendChild(ghost);
    return ghost;
}

function moveTouchGhost(x, y) {
    if (!touchGhost) return;
    touchGhost.style.transform = `translate(${x - touchGhost.offsetWidth / 2}px, ${y - touchGhost.offsetHeight / 2}px)`;
}

function clearTouchDrag() {
    if (touchGhost) {
        touchGhost.remove();
        touchGhost = null;
    }
    touchDragId = null;
    cauldron.classList.remove("drag-over");
}

potionElements.forEach((potion) => {
    potion.addEventListener("touchstart", (e) => {
        const touch = e.touches[0];
        if (!touch) return;

        touchDragId = potion.id;
        touchGhost = createTouchGhost(potion);
        moveTouchGhost(touch.clientX, touch.clientY);
        e.preventDefault();
    }, { passive: false });

    potion.addEventListener("touchmove", (e) => {
        const touch = e.touches[0];
        if (!touch || !touchDragId) return;

        moveTouchGhost(touch.clientX, touch.clientY);

        if (isPointInCauldron(touch.clientX, touch.clientY)) {
            cauldron.classList.add("drag-over");
        } else {
            cauldron.classList.remove("drag-over");
        }

        e.preventDefault();
    }, { passive: false });

    potion.addEventListener("touchend", (e) => {
        const touch = e.changedTouches[0];
        if (touch && touchDragId && isPointInCauldron(touch.clientX, touch.clientY)) {
            applyPotionEffect(touchDragId);
        }

        clearTouchDrag();
    });

    potion.addEventListener("touchcancel", clearTouchDrag);
});

// efecto visual drag
cauldron.addEventListener("dragenter", () => {
    cauldron.classList.add("drag-over");
});

cauldron.addEventListener("dragleave", () => {
    cauldron.classList.remove("drag-over");
});

// reset
document.body.addEventListener("click", (e) => {
    if (!e.target.closest("#cauldron")) {
        Object.values(potionClasses).forEach(cls => body.classList.remove(cls));
        document.getElementById("css_code").textContent = "Arrastra una poción al caldero...";
    }
});
</script>

</body>
</html>
